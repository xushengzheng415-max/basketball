<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050607"/>
      <stop offset="0.55" stop-color="#111315"/>
      <stop offset="1" stop-color="#231007"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#ff4b00"/>
    </linearGradient>
    <style>
      .page{fill:url(#bg)}
      .card{fill:rgba(255,255,255,.055);stroke:#ff6a00;stroke-width:2;rx:18}
      .soft{fill:rgba(255,255,255,.045);stroke:rgba(255,255,255,.24);stroke-width:1.5;rx:16}
      .locked{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.28);stroke-width:1.5;rx:16}
      .score{fill:rgba(0,0,0,.34);stroke:#ff6a00;stroke-width:2;rx:18}
      .mc{fill:rgba(0,0,0,.34);stroke:#ff6a00;stroke-width:2;rx:18}
      .popup{fill:rgba(255,106,0,.12);stroke:#ff6a00;stroke-width:2;rx:14}
      .title{font:700 34px "Microsoft YaHei","PingFang SC",sans-serif;fill:#fff}
      .h1{font:700 28px "Microsoft YaHei","PingFang SC",sans-serif;fill:#fff}
      .h2{font:700 23px "Microsoft YaHei","PingFang SC",sans-serif;fill:#fff}
      .body{font:500 18px "Microsoft YaHei","PingFang SC",sans-serif;fill:#d8dde4}
      .small{font:500 15px "Microsoft YaHei","PingFang SC",sans-serif;fill:#aeb4bd}
      .orange{fill:#ff6a00}.green{fill:#39d071}.muted{fill:#9097a1}
      .line{stroke:rgba(255,255,255,.24);stroke-width:1}
      .dash{stroke:#ff6a00;stroke-width:2;stroke-dasharray:8 8;fill:none}
    </style>
  </defs>

  <rect class="page" width="1800" height="1050"/>
  <path d="M0 735 C360 650 540 820 850 720 C1140 620 1340 650 1800 560" fill="none" stroke="#ff6a00" stroke-width="4" opacity=".22"/>
  <path d="M0 780 C380 675 560 850 880 745 C1160 645 1360 680 1800 595" fill="none" stroke="#ff6a00" stroke-width="2" opacity=".16"/>

  <text x="60" y="58" class="title">赛小蜂比分板 模块架构图</text>
  <text x="60" y="92" class="body">中间比赛控制区和比分区保持现有三栏形态；免费版与付费版差异只体现在左右阵容固定区是否解锁个人数据。</text>

  <rect x="40" y="120" width="1720" height="70" class="soft"/>
  <text x="70" y="164" class="h2">顶部状态栏</text>
  <text x="255" y="164" class="body">返回 / LIVE / 赛事名称 / 当前节次 / 比赛时间 / 设置 / 网络状态 / 同步状态</text>

  <rect x="40" y="220" width="300" height="485" class="card"/>
  <text x="68" y="260" class="h1">左侧阵容固定区</text>
  <text x="68" y="292" class="body">主队：蜂巢U10A</text>
  <rect x="68" y="318" width="244" height="230" class="locked"/>
  <text x="88" y="352" class="h2">首发名单 5 人</text>
  <text x="88" y="385" class="body">头像 / 号码 / 姓名 / 位置</text>
  <text x="88" y="417" class="body">只展示基础身份</text>
  <text x="88" y="449" class="body">不展示篮板、助攻等数据</text>
  <text x="88" y="492" class="small">免费版：未解锁状态，可见不可点</text>
  <text x="88" y="520" class="small">付费版：点击球员弹出统计菜单</text>
  <rect x="68" y="570" width="244" height="92" class="locked"/>
  <text x="88" y="605" class="h2">替补名单</text>
  <text x="88" y="637" class="body">长按首发/替补互换</text>

  <rect x="370" y="220" width="1060" height="485" class="score"/>
  <text x="400" y="260" class="h1">中间：保持图一比分控制形态</text>
  <rect x="400" y="290" width="300" height="380" class="soft"/>
  <text x="430" y="330" class="h2">主队比分卡</text>
  <text x="430" y="372" class="body">队标 + 队名</text>
  <text x="430" y="420" class="title orange">38</text>
  <text x="430" y="474" class="body">累计犯规 3 / 暂停 2</text>
  <text x="430" y="520" class="body">+1 / +2 / +3</text>
  <text x="430" y="552" class="body">犯规 / 暂停 / 换人</text>
  <text x="430" y="625" class="small">免费、付费都保留</text>

  <rect x="750" y="290" width="300" height="380" class="soft"/>
  <text x="780" y="330" class="h2">中央控制卡</text>
  <text x="780" y="378" class="title">06:32</text>
  <text x="780" y="430" class="body">开始/暂停 / 重置</text>
  <text x="780" y="462" class="body">上一节 / Q2 / 下一节</text>
  <text x="780" y="494" class="body">交换场地</text>
  <text x="780" y="526" class="body">最近操作 / 清空 / 撤销</text>
  <text x="780" y="625" class="small">保持现有布局，不重新规划</text>

  <rect x="1100" y="290" width="300" height="380" class="soft"/>
  <text x="1130" y="330" class="h2">客队比分卡</text>
  <text x="1130" y="372" class="body">队标 + 队名</text>
  <text x="1130" y="420" class="title">34</text>
  <text x="1130" y="474" class="body">累计犯规 2 / 暂停 1</text>
  <text x="1130" y="520" class="body">+1 / +2 / +3</text>
  <text x="1130" y="552" class="body">犯规 / 暂停 / 换人</text>
  <text x="1130" y="625" class="small">免费、付费都保留</text>

  <rect x="1460" y="220" width="300" height="485" class="card"/>
  <text x="1488" y="260" class="h1">右侧阵容固定区</text>
  <text x="1488" y="292" class="body">客队：星火U10</text>
  <rect x="1488" y="318" width="244" height="230" class="locked"/>
  <text x="1508" y="352" class="h2">首发名单 5 人</text>
  <text x="1508" y="385" class="body">头像 / 号码 / 姓名 / 位置</text>
  <text x="1508" y="417" class="body">只展示基础身份</text>
  <text x="1508" y="449" class="body">不展示篮板、助攻等数据</text>
  <text x="1508" y="492" class="small">免费版：未解锁状态，可见不可点</text>
  <text x="1508" y="520" class="small">付费版：点击球员弹出统计菜单</text>
  <rect x="1488" y="570" width="244" height="92" class="locked"/>
  <text x="1508" y="605" class="h2">替补名单</text>
  <text x="1508" y="637" class="body">长按首发/替补互换</text>

  <path class="dash" d="M330 430 C420 360 505 360 585 430"/>
  <path class="dash" d="M1470 430 C1380 360 1295 360 1215 430"/>
  <rect x="585" y="710" width="630" height="74" class="popup"/>
  <text x="615" y="744" class="h2">球员点击弹窗</text>
  <text x="615" y="774" class="body">罚球 +1 / 两分 +2 / 三分 +3 / 篮板 / 助攻 / 抢断 / 盖帽 / 失误 / 犯规</text>
  <text x="1230" y="746" class="small orange">只在弹窗体现，不放到球员卡片上</text>

  <rect x="40" y="815" width="1720" height="190" class="mc"/>
  <text x="70" y="858" class="h1">底部：MC 功能面板</text>

  <rect x="70" y="878" width="330" height="100" class="soft"/>
  <text x="95" y="912" class="h2">AI 播音员</text>
  <text x="95" y="944" class="body">赛小智 / 赛小锦 / 赛小萌</text>
  <text x="95" y="970" class="small">当前音色高亮</text>

  <rect x="430" y="878" width="520" height="100" class="soft"/>
  <text x="455" y="912" class="h2">音效键</text>
  <text x="455" y="944" class="body">常用：进攻音效 / 防守音效</text>
  <text x="455" y="970" class="small">自定义：投篮未进 / 欢呼声 / 叫声 / 其他，4 键可替换</text>

  <rect x="980" y="878" width="455" height="100" class="soft"/>
  <text x="1005" y="912" class="h2">外设快捷键</text>
  <text x="1005" y="944" class="body">蓝牙 6 键映射</text>
  <text x="1005" y="970" class="small">上排：进攻/防守/2分；下排：3分/未进/蜂鸣器</text>

  <rect x="1480" y="878" width="96" height="100" class="soft"/>
  <circle cx="1528" cy="916" r="24" fill="url(#orange)"/>
  <path d="M1528 895v8M1528 929v8M1507 916h8M1541 916h8M1513 901l6 6M1537 925l6 6M1513 931l6-6M1537 907l6-6" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <text x="1497" y="970" class="small">MC设置</text>

  <rect x="1605" y="878" width="125" height="100" class="locked"/>
  <text x="1625" y="914" class="h2">状态</text>
  <text x="1625" y="944" class="small green">已连接</text>
  <text x="1625" y="970" class="small">音效包正常</text>

  <rect x="60" y="1020" width="18" height="18" rx="4" fill="rgba(255,255,255,.16)" stroke="rgba(255,255,255,.35)"/>
  <text x="90" y="1036" class="small">免费版：左右阵容区显示未解锁，基础比分控制与 MC 可用</text>
  <rect x="610" y="1020" width="18" height="18" rx="4" fill="rgba(255,106,0,.18)" stroke="#ff6a00"/>
  <text x="640" y="1036" class="small">付费版：左右阵容区解锁，点击球员记录个人统计并同步球队得分</text>
</svg>
