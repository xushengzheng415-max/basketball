<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#07131d" flood-opacity=".14"/>
    </filter>
    <linearGradient id="orangeGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff6a20"/>
      <stop offset="100%" stop-color="#e93708"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e1f2b"/>
      <stop offset="100%" stop-color="#07131d"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;dominant-baseline:hanging}
    .title{font-weight:800;fill:#07131d}
    .sub{fill:#647184}
    .white{fill:#fff}
    .muted{fill:#647184}
    .small{font-size:14px}
    .label{font-size:18px;font-weight:700;fill:#07131d}
    .btnText{font-size:18px;font-weight:800}
    .score{font-size:92px;font-weight:900;fill:#ff4d18}
  </style>
  
  <rect width="390" height="844" rx="0" fill="#f3f6fa"/>
  <rect y="0" width="390" height="88" fill="#07131d"/>
  <text x="195" y="45" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">比赛计分</text>
  <circle cx="315" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <circle cx="350" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <text x="27" y="48" font-size="30" fill="#fff">‹</text>
  
  <rect x="16" y="112" width="358" height="606" rx="8" fill="#fff" filter="url(#shadow)"/>
  <text x="34" y="134" font-size="27" font-weight="900" fill="#07131d">快速开始比赛</text>
  <text x="34" y="174" font-size="14" fill="#647184">设置主客队、比赛节数、每节时长和计时方式。</text>
  <text x="34" y="214" class="label">主队名称</text>
  <rect x="34" y="244" width="322" height="48" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="48" y="259" font-size="16" fill="#647184">主队</text>
  <text x="34" y="310" class="label">客队名称</text>
  <rect x="34" y="340" width="322" height="48" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="48" y="355" font-size="16" fill="#647184">客队</text>
  <text x="34" y="406" class="label">每节时长</text>
  <rect x="34" y="438" width="96" height="40" rx="7" fill="#fff" stroke="#dbe3ee"/><text x="82" y="450" text-anchor="middle" font-size="16" font-weight="800">6分</text>
  <rect x="146" y="438" width="96" height="40" rx="7" fill="#ff4d18"/><text x="194" y="450" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">8分</text>
  <rect x="258" y="438" width="96" height="40" rx="7" fill="#fff" stroke="#dbe3ee"/><text x="306" y="450" text-anchor="middle" font-size="16" font-weight="800">10分</text>
  <text x="34" y="506" class="label">比赛节数</text>
  <rect x="34" y="538" width="96" height="40" rx="7" fill="#fff" stroke="#dbe3ee"/><text x="82" y="550" text-anchor="middle" font-size="16" font-weight="800">2节</text>
  <rect x="146" y="538" width="96" height="40" rx="7" fill="#ff4d18"/><text x="194" y="550" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">4节</text>
  <rect x="258" y="538" width="96" height="40" rx="7" fill="#fff" stroke="#dbe3ee"/><text x="306" y="550" text-anchor="middle" font-size="16" font-weight="800">6节</text>
  <text x="34" y="606" class="label">计时方式</text>
  <rect x="34" y="638" width="154" height="42" rx="7" fill="#ff4d18"/><text x="111" y="650" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">倒计时</text>
  <rect x="202" y="638" width="154" height="42" rx="7" fill="#fff" stroke="#dbe3ee"/><text x="279" y="650" text-anchor="middle" font-size="17" font-weight="900" fill="#07131d">正计时</text>
  <rect x="34" y="696" width="322" height="50" rx="8" fill="url(#orangeGrad)"/>
  <text x="195" y="711" text-anchor="middle" class="btnText" fill="#fff">开始比赛</text>

  <rect y="786" width="390" height="58" fill="#fff"/>
  <line x1="0" y1="786" x2="390" y2="786" stroke="#dbe3ee"/>
  <text x="53" y="809" text-anchor="middle" font-size="13" fill="#ff4d18">首页</text>
  <text x="145" y="809" text-anchor="middle" font-size="13" fill="#647184">赛事</text>
  <text x="240" y="809" text-anchor="middle" font-size="13" fill="#647184">球员</text>
  <text x="334" y="809" text-anchor="middle" font-size="13" fill="#647184">我的</text>
  <rect x="143" y="831" width="104" height="4" rx="2" fill="#111"/>
  
</svg>