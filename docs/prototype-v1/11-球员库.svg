<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#07131d" flood-opacity=".14"/>
    </filter>
    <linearGradient id="orangeGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff6a20"/>
      <stop offset="100%" stop-color="#e93708"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e1f2b"/>
      <stop offset="100%" stop-color="#07131d"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;dominant-baseline:hanging}
    .title{font-weight:800;fill:#07131d}
    .sub{fill:#647184}
    .white{fill:#fff}
    .muted{fill:#647184}
    .small{font-size:14px}
    .label{font-size:18px;font-weight:700;fill:#07131d}
    .btnText{font-size:18px;font-weight:800}
    .score{font-size:92px;font-weight:900;fill:#ff4d18}
  </style>
  
  <rect width="390" height="844" rx="0" fill="#f3f6fa"/>
  <rect y="0" width="390" height="88" fill="#07131d"/>
  <text x="195" y="45" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">球员库</text>
  <circle cx="315" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <circle cx="350" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <text x="27" y="48" font-size="30" fill="#fff">‹</text>
  
  <text x="16" y="112" font-size="28" font-weight="900" fill="#07131d">球员库</text>
  <text x="16" y="148" font-size="14" fill="#647184">球衣号不可重复，已使用号码会自动锁定。</text>
  <rect x="16" y="184" width="358" height="176" rx="8" fill="#fff" filter="url(#shadow)"/>
  <rect x="32" y="206" width="326" height="42" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="46" y="218" font-size="16" fill="#647184">球员姓名</text>
  <rect x="32" y="262" width="326" height="42" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="46" y="274" font-size="16" fill="#647184">球衣号码，例如：8</text>
  <text x="32" y="316" font-size="12" fill="#647184">已占用号码：#1、#2、#3、#5</text>
  <rect x="32" y="340" width="326" height="44" rx="8" fill="url(#orangeGrad)"/>
  <text x="195" y="352" text-anchor="middle" class="btnText" fill="#fff">添加球员</text>
  <text x="16" y="414" font-size="20" font-weight="900" fill="#07131d">当前名单</text>
  <rect x="16" y="452" width="358" height="56" rx="8" fill="#fff" filter="url(#shadow)"/><text x="32" y="470" font-size="20" font-weight="900" fill="#ff4d18">#1</text><text x="72" y="472" font-size="18" font-weight="800" fill="#07131d">李现</text><text x="322" y="472" font-size="14" font-weight="900" fill="#ff4d18">删除</text>
  <rect x="16" y="520" width="358" height="56" rx="8" fill="#fff" filter="url(#shadow)"/><text x="32" y="538" font-size="20" font-weight="900" fill="#ff4d18">#3</text><text x="72" y="540" font-size="18" font-weight="800" fill="#07131d">王浩</text><text x="322" y="540" font-size="14" font-weight="900" fill="#ff4d18">删除</text>
  <rect x="16" y="588" width="358" height="56" rx="8" fill="#fff" filter="url(#shadow)"/><text x="32" y="606" font-size="20" font-weight="900" fill="#ff4d18">#5</text><text x="72" y="608" font-size="18" font-weight="800" fill="#07131d">李哲</text><text x="322" y="608" font-size="14" font-weight="900" fill="#ff4d18">删除</text>

  <rect y="786" width="390" height="58" fill="#fff"/>
  <line x1="0" y1="786" x2="390" y2="786" stroke="#dbe3ee"/>
  <text x="53" y="809" text-anchor="middle" font-size="13" fill="#ff4d18">首页</text>
  <text x="145" y="809" text-anchor="middle" font-size="13" fill="#647184">赛事</text>
  <text x="240" y="809" text-anchor="middle" font-size="13" fill="#647184">球员</text>
  <text x="334" y="809" text-anchor="middle" font-size="13" fill="#647184">我的</text>
  <rect x="143" y="831" width="104" height="4" rx="2" fill="#111"/>
  
</svg>