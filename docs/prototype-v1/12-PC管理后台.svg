  <line x1="284" y1="342" x2="1260" y2="342" stroke="#dbe3ee"/>
  <text x="284" y="362" font-size="15" font-weight="800" fill="#647184">昵称</text><text x="480" y="362" font-size="15" font-weight="800" fill="#647184">手机号</text><text x="700" y="362" font-size="15" font-weight="800" fill="#647184">会员状态</text><text x="930" y="362" font-size="15" font-weight="800" fill="#647184">活动</text><text x="1130" y="362" font-size="15" font-weight="800" fill="#647184">操作</text>
  <text x="284" y="410" font-size="17" font-weight="900" fill="#07131d">微信用户</text><text x="480" y="410" font-size="17" fill="#07131d">173****6663</text><text x="700" y="410" font-size="17" fill="#00c68a">分享会员 · 1天</text><text x="930" y="410" font-size="17" fill="#07131d">使用 2.4 小时</text><text x="1130" y="410" font-size="15" font-weight="900" fill="#ff4d18">调整时间</text>
  <rect x="260" y="550" width="1040" height="220" rx="8" fill="#fff" filter="url(#shadow)"/>
  <text x="284" y="576" font-size="22" font-weight="900" fill="#07131d">MC 音乐库</text>
  <rect x="284" y="626" width="220" height="40" rx="6" fill="#fff" stroke="#dbe3ee"/><text x="304" y="638" font-size="16" fill="#07131d">进攻音乐</text>
  <rect x="526" y="626" width="320" height="40" rx="6" fill="#fff" stroke="#dbe3ee"/><text x="546" y="638" font-size="16" fill="#647184">音效名称，例如：Remember the Name</text>
  <rect x="868" y="626" width="360" height="40" rx="6" fill="#fff" stroke="#dbe3ee"/><text x="888" y="638" font-size="16" fill="#647184">cloud://.../mc-mp3/...</text>
  <rect x="284" y="690" width="126" height="42" rx="8" fill="#00c68a"/>
  <text x="347" y="701" text-anchor="middle" class="btnText" fill="#fff">保存到音乐库</text>

</svg>