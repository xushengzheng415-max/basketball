  <text x="42" y="358" font-size="16" font-weight="800" fill="#cbd5e1">MC 音乐库</text>
  <text x="260" y="52" font-size="34" font-weight="900" fill="#07131d">小程序数据看板</text>
  <text x="260" y="94" font-size="18" fill="#647184">查看用户、反馈、权益、会员码，并维护 MC 音乐库。</text>
  <rect x="1240" y="42" width="86" height="38" rx="8" fill="#ff4d18"/>
  <text x="1283" y="51" text-anchor="middle" class="btnText" fill="#fff">读取云端</text>
  <rect x="260" y="136" width="170" height="92" rx="8" fill="#fff" filter="url(#shadow)"/><text x="284" y="158" font-size="16" font-weight="800" fill="#647184">用户数</text><text x="284" y="188" font-size="34" font-weight="900" fill="#07131d">128</text>
  <rect x="452" y="136" width="170" height="92" rx="8" fill="#fff" filter="url(#shadow)"/><text x="476" y="158" font-size="16" font-weight="800" fill="#647184">反馈数</text><text x="476" y="188" font-size="34" font-weight="900" fill="#07131d">12</text>
  <rect x="644" y="136" width="170" height="92" rx="8" fill="#fff" filter="url(#shadow)"/><text x="668" y="158" font-size="16" font-weight="800" fill="#647184">会员数</text><text x="668" y="188" font-size="34" font-weight="900" fill="#07131d">36</text>
  <rect x="836" y="136" width="170" height="92" rx="8" fill="#fff" filter="url(#shadow)"/><text x="860" y="158" font-size="16" font-weight="800" fill="#647184">赛果数</text><text x="860" y="188" font-size="34" font-weight="900" fill="#07131d">420</text>
  <rect x="260" y="268" width="1040" height="250" rx="8" fill="#fff" filter="url(#shadow)"/>
