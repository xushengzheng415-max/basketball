<svg xmlns="http://www.w3.org/2000/svg" width="844" height="390" viewBox="0 0 844 390">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#07131d" flood-opacity=".14"/>
    </filter>
    <linearGradient id="orangeGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff6a20"/>
      <stop offset="100%" stop-color="#e93708"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e1f2b"/>
      <stop offset="100%" stop-color="#07131d"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;dominant-baseline:hanging}
    .title{font-weight:800;fill:#07131d}
    .sub{fill:#647184}
    .white{fill:#fff}
    .muted{fill:#647184}
    .small{font-size:14px}
    .label{font-size:18px;font-weight:700;fill:#07131d}
    .btnText{font-size:18px;font-weight:800}
    .score{font-size:92px;font-weight:900;fill:#ff4d18}
  </style>
  
  <rect width="844" height="390" fill="#07131d"/>
  <rect x="606" y="18" width="222" height="330" rx="12" fill="#101f2c" filter="url(#shadow)"/>
  <text x="626" y="42" font-size="22" font-weight="900" fill="#fff">外设快捷键</text>
  <text x="626" y="74" font-size="13" fill="#aab6c3">6 键蓝牙小键盘专用，可监听后绑定音效。</text>
  <rect x="626" y="102" width="82" height="34" rx="8" fill="#203244"/>
  <text x="667" y="109" text-anchor="middle" class="btnText" fill="#fff">监听</text>
  <rect x="720" y="102" width="82" height="34" rx="8" fill="#ffd956"/>
  <text x="761" y="109" text-anchor="middle" class="btnText" fill="#07131d">编辑</text>
  <rect x="626" y="156" width="58" height="52" rx="8" fill="#334155"/><text x="655" y="164" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">1</text><text x="655" y="188" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">欢呼</text>
  <rect x="696" y="156" width="58" height="52" rx="8" fill="#334155"/><text x="725" y="164" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">2</text><text x="725" y="188" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">2分</text>
  <rect x="766" y="156" width="58" height="52" rx="8" fill="#334155"/><text x="795" y="164" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">3</text><text x="795" y="188" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">3分</text>
  <rect x="626" y="222" width="58" height="52" rx="8" fill="#334155"/><text x="655" y="230" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">4</text><text x="655" y="254" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">休息</text>
  <rect x="696" y="222" width="58" height="52" rx="8" fill="#334155"/><text x="725" y="230" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">5</text><text x="725" y="254" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">进攻</text>
  <rect x="766" y="222" width="58" height="52" rx="8" fill="#334155"/><text x="795" y="230" text-anchor="middle" font-size="18" font-weight="900" fill="#ffd956">6</text><text x="795" y="254" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">防守</text>
  <rect x="22" y="80" width="548" height="210" rx="12" fill="#fff" opacity=".8"/>
  <text x="296" y="136" text-anchor="middle" font-size="72" font-weight="900" fill="#ff4d18">68 : 64</text>
  <text x="296" y="222" text-anchor="middle" font-size="22" font-weight="800" fill="#07131d">右侧抽屉只负责外设触发，不占主计分空间</text>

</svg>