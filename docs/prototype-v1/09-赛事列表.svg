<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#07131d" flood-opacity=".14"/>
    </filter>
    <linearGradient id="orangeGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff6a20"/>
      <stop offset="100%" stop-color="#e93708"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e1f2b"/>
      <stop offset="100%" stop-color="#07131d"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;dominant-baseline:hanging}
    .title{font-weight:800;fill:#07131d}
    .sub{fill:#647184}
    .white{fill:#fff}
    .muted{fill:#647184}
    .small{font-size:14px}
    .label{font-size:18px;font-weight:700;fill:#07131d}
    .btnText{font-size:18px;font-weight:800}
    .score{font-size:92px;font-weight:900;fill:#ff4d18}
  </style>
  
  <rect width="390" height="844" rx="0" fill="#f3f6fa"/>
  <rect y="0" width="390" height="88" fill="#07131d"/>
  <text x="195" y="45" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">赛事</text>
  <circle cx="315" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <circle cx="350" cy="58" r="17" fill="#111c27" stroke="#3b4a58"/>
  <text x="27" y="48" font-size="30" fill="#fff">‹</text>
  
  <text x="16" y="112" font-size="28" font-weight="900" fill="#07131d">创建赛事</text>
  <rect x="16" y="154" width="358" height="196" rx="8" fill="#fff" filter="url(#shadow)"/>
  <rect x="32" y="176" width="326" height="42" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="46" y="188" font-size="16" fill="#647184">赛事名称，例如：黄冠篮球赛</text>
  <rect x="32" y="232" width="326" height="42" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="46" y="244" font-size="16" fill="#647184">比赛地点，例如：1号场地</text>
  <rect x="32" y="288" width="326" height="42" rx="6" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="46" y="300" font-size="16" fill="#647184">选择比赛日期</text>
  <rect x="32" y="358" width="326" height="46" rx="8" fill="url(#orangeGrad)"/>
  <text x="195" y="371" text-anchor="middle" class="btnText" fill="#fff">保存赛事</text>
  <text x="16" y="430" font-size="20" font-weight="900" fill="#07131d">已创建赛事</text>
  <rect x="16" y="470" width="358" height="108" rx="8" fill="#fff" filter="url(#shadow)"/>
  <text x="32" y="492" font-size="22" font-weight="900" fill="#07131d">黄冠篮球赛</text>
  <text x="32" y="528" font-size="14" fill="#647184">1号场地 · 2026-07-05</text>
  <rect x="236" y="488" width="54" height="34" rx="8" fill="#203244"/>
  <text x="263" y="495" text-anchor="middle" class="btnText" fill="#fff">编辑</text>
  <rect x="302" y="488" width="54" height="34" rx="8" fill="#ff4d18"/>
  <text x="329" y="495" text-anchor="middle" class="btnText" fill="#fff">删除</text>
  <rect x="16" y="598" width="358" height="92" rx="8" fill="#fff" filter="url(#shadow)"/>
  <text x="32" y="620" font-size="22" font-weight="900" fill="#07131d">练习赛</text>
  <text x="32" y="656" font-size="14" fill="#647184">未填写日期</text>

  <rect y="786" width="390" height="58" fill="#fff"/>
  <line x1="0" y1="786" x2="390" y2="786" stroke="#dbe3ee"/>
  <text x="53" y="809" text-anchor="middle" font-size="13" fill="#ff4d18">首页</text>
  <text x="145" y="809" text-anchor="middle" font-size="13" fill="#647184">赛事</text>
  <text x="240" y="809" text-anchor="middle" font-size="13" fill="#647184">球员</text>
  <text x="334" y="809" text-anchor="middle" font-size="13" fill="#647184">我的</text>
  <rect x="143" y="831" width="104" height="4" rx="2" fill="#111"/>
  
</svg>