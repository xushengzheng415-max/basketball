<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>赛小蜂篮球 - 教务账户开户</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f3f5f7;color:#101820;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.shell{max-width:920px;margin:0 auto;padding:40px 24px}.brand{color:#f05a28;font-weight:900}.title{margin:8px 0 0;font-size:32px}.desc{margin-top:10px;color:#667085;line-height:1.7}.notice{margin-top:22px;padding:16px 18px;border-left:4px solid #f05a28;border-radius:8px;background:#fff8f4;color:#8a3415}.panel{margin-top:22px;padding:24px;border-radius:14px;background:#fff;box-shadow:0 8px 30px #10182012}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}label{font-size:13px;font-weight:800;color:#475467}input,select{height:44px;border:1px solid #d0d5dd;border-radius:9px;padding:0 12px;font:inherit}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}button{height:42px;border:0;border-radius:9px;padding:0 18px;font-weight:900;cursor:pointer}.primary{background:#f05a28;color:#fff}.secondary{background:#101820;color:#fff}.danger{background:#fff1f0;color:#b42318}.result{display:none;margin-top:18px;padding:14px;border-radius:9px;background:#101820;color:#fff;font:13px/1.6 Consolas,monospace;white-space:pre-wrap;word-break:break-all}.result.show{display:block}@media(max-width:680px){.grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">赛小蜂篮球 · PC 管理端</div>
    <h1 class="title">教务账户开户</h1>
    <div class="desc">赛事、计分、球队球员数据和 MC 不受此处控制。此页面只负责下发或撤销教务系统账户。</div>
    <div class="notice">请先确认用户 OpenID。开户成功后，用户重新进入小程序教务页即可从演示模式切换为正式使用状态。</div>
    <section class="panel">
      <div class="grid">
        <div class="field full"><label>云函数 HTTP 网关地址</label><input id="gateway" placeholder="https://xxx.app.tcloudbase.com"></div>
        <div class="field full"><label>管理员口令 SXF_ADMIN_TOKEN</label><input id="token" type="password" placeholder="管理员口令"></div>
        <div class="field full"><label>用户 OpenID</label><input id="openid" placeholder="请输入需要开户的微信 OpenID"></div>
        <div class="field"><label>授权时长</label><select id="duration"><option value="365">1 年</option><option value="180">180 天</option><option value="90">90 天</option><option value="30">30 天</option><option value="lifetime">永久</option></select></div>
        <div class="field"><label>权益标识</label><input value="education_system" disabled></div>
      </div>
      <div class="actions"><button class="primary" id="open">下发账户并开户</button><button class="secondary" id="extend">按所选时长续期</button><button class="danger" id="revoke">撤销教务账户</button></div>
      <div class="result" id="result"></div>
    </section>
  </main>
  <script>
    const $=id=>document.getElementById(id);const save=()=>{localStorage.setItem('sx_admin_gateway',$('gateway').value.trim());localStorage.setItem('sx_admin_token',$('token').value.trim())};$('gateway').value=localStorage.getItem('sx_admin_gateway')||'';$('token').value=localStorage.getItem('sx_admin_token')||'';async function update(action){const base=$('gateway').value.trim().replace(/\/$/,'');const openid=$('openid').value.trim();const duration=$('duration').value;if(!base||!openid)return show({ok:false,message:'请填写网关地址和 OpenID'});save();if(action==='revoke'&&!confirm('确认撤销该用户的教务账户吗？免费赛事、计分、球队球员和 MC 不受影响。'))return;const payload={adminToken:$('token').value.trim(),openid,feature:'education_system',action:action==='open'?(duration==='lifetime'?'lifetime':'set'):action,days:duration==='lifetime'?0:Number(duration)};try{const response=await fetch(base+'/sxAdminUpdateEntitlement',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});show(await response.json())}catch(error){show({ok:false,message:error.message})}}function show(data){$('result').classList.add('show');$('result').textContent=JSON.stringify(data,null,2)}$('open').onclick=()=>update('open');$('extend').onclick=()=>update($('duration').value==='lifetime'?'lifetime':'extend');$('revoke').onclick=()=>update('revoke');
  </script>
</body>
</html>
