<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>&#x8d5b;&#x5c0f;&#x8702;&#x7bee;&#x7403;&#x8fd0;&#x8425;&#x540e;&#x53f0;</title><style>body{margin:0;background:#f4f7fa;color:#101820;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.side{background:#101820;color:#fff;padding:26px}.brand{color:#ffd65a;font-weight:900}.title{font-size:28px;font-weight:900;margin-top:8px}.nav{display:grid;gap:8px;margin-top:30px}.nav button{height:42px;border:0;border-radius:8px;background:transparent;color:#d7dee8;text-align:left;padding:0 12px;font-weight:900}.nav button.active{background:#263241;color:#fff}.main{padding:26px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}h1{margin:0}.muted{color:#667085}.config{display:grid;grid-template-columns:1fr 220px;gap:10px;margin:18px 0}input,select{height:40px;border:1px solid #e5eaf0;border-radius:8px;padding:0 12px;font:inherit}.btn{height:40px;border:1px solid #e5eaf0;border-radius:8px;background:#fff;padding:0 14px;font-weight:900;cursor:pointer}.primary{border-color:#f05a28;background:#f05a28;color:#fff}.green{border-color:#0f9f6e;background:#0f9f6e;color:#fff}.danger{border-color:#fee4e2;background:#fff5f5;color:#b42318}.mini{height:30px;font-size:12px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.stat,.panel{background:#fff;border-radius:8px;box-shadow:0 1px 2px #0001}.stat{padding:16px}.stat span{display:block;color:#667085;font-size:13px;font-weight:900}.stat strong{font-size:28px}.panel{margin-top:20px;overflow:hidden}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;border-bottom:1px solid #e5eaf0}.body{padding:18px}.hidden{display:none}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #eef2f6;text-align:left;vertical-align:top}th{font-size:12px;color:#667085;background:#fbfcfe}.tag{display:inline-flex;border-radius:999px;background:#fff3ed;color:#f05a28;padding:4px 9px;font-size:12px;font-weight:900}.ok{background:#ecfdf3;color:#027a48}.gray{background:#f2f4f7;color:#667085}.mono{font-family:Consolas,monospace;font-size:12px}.row{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.result{margin-top:12px;background:#101820;color:#fff;border-radius:8px;padding:12px;white-space:pre-wrap;word-break:break-all}.audio{display:grid;grid-template-columns:120px 1fr 2fr;gap:10px;padding:10px;border:1px solid #eef2f6;border-radius:8px;margin-top:8px}@media(max-width:900px){.shell,.config,.grid,.stats,.audio{grid-template-columns:1fr}.top{display:block}}</style></head><body><div class="shell"><aside class="side"><div class="brand">&#x8d5b;&#x5c0f;&#x8702;&#x7bee;&#x7403;</div><div class="title">&#x8fd0;&#x8425;&#x540e;&#x53f0;</div><div class="nav"><button class="active" data-tab="overview">&#x6570;&#x636e;&#x6982;&#x89c8;</button><button data-tab="users">&#x7528;&#x6237;&#x8d44;&#x6599;</button><button data-tab="feedback">&#x53cd;&#x9988;&#x4fe1;&#x606f;</button><button data-tab="redeem">&#x4f1a;&#x5458;&#x7801;</button><button data-tab="audio">MC &#x97f3;&#x4e50;&#x5e93;</button></div></aside><main class="main"><div class="top"><div><h1>&#x5c0f;&#x7a0b;&#x5e8f;&#x6570;&#x636e;&#x770b;&#x677f;</h1><div class="muted">&#x67e5;&#x770b;&#x7528;&#x6237;&#x3001;&#x53cd;&#x9988;&#x3001;&#x6743;&#x76ca;&#x3001;&#x4f1a;&#x5458;&#x7801;&#xff0c;&#x5e76;&#x7ef4;&#x62a4; MC &#x97f3;&#x4e50;&#x5e93;&#x3002;</div></div><div class="row"><button class="btn" id="loadSample">&#x52a0;&#x8f7d;&#x793a;&#x4f8b;</button><button class="btn primary" id="loadCloud">&#x8bfb;&#x53d6;&#x4e91;&#x7aef;</button></div></div><div class="config"><input id="gatewayBase" placeholder="&#x4e91;&#x51fd;&#x6570;&#x20;&#x48;&#x54;&#x54;&#x50;&#x20;&#x7f51;&#x5173;&#x57df;&#x540d;&#xff0c;&#x4f8b;&#x5982;&#xff1a;&#x68;&#x74;&#x74;&#x70;&#x73;&#x3a;&#x2f;&#x2f;&#x78;&#x78;&#x78;&#x2e;&#x61;&#x70;&#x70;&#x2e;&#x74;&#x63;&#x6c;&#x6f;&#x75;&#x64;&#x62;&#x61;&#x73;&#x65;&#x2e;&#x63;&#x6f;&#x6d;"><input id="adminToken" placeholder="&#x540e;&#x53f0;&#x53e3;&#x4ee4;&#x20;&#x53;&#x58;&#x46;&#x5f;&#x41;&#x44;&#x4d;&#x49;&#x4e;&#x5f;&#x54;&#x4f;&#x4b;&#x45;&#x4e;"></div><section class="stats"><div class="stat"><span>&#x7528;&#x6237;&#x6570;</span><strong id="userCount">0</strong></div><div class="stat"><span>&#x53cd;&#x9988;&#x6570;</span><strong id="feedbackCount">0</strong></div><div class="stat"><span>&#x8ba2;&#x5355;&#x6570;</span><strong id="orderCount">0</strong></div><div class="stat"><span>&#x6743;&#x76ca;&#x6570;</span><strong id="entitlementCount">0</strong></div><div class="stat"><span>&#x4f1a;&#x5458;&#x7801;</span><strong id="redeemCount">0</strong></div><div class="stat"><span>&#x8d5b;&#x679c;&#x6570;</span><strong id="matchCount">0</strong></div></section><section class="panel" data-panel="overview"><div class="head"><b>&#x6700;&#x8fd1;&#x53cd;&#x9988;</b></div><div id="overviewContent"></div></section><section class="panel hidden" data-panel="users"><div class="head"><b>&#x7528;&#x6237;&#x8d44;&#x6599;</b><input id="userSearch" placeholder="&#x641c;&#x7d22;&#x20;&#x6f;&#x70;&#x65;&#x6e;&#x69;&#x64;&#x20;&#x2f;&#x20;&#x624b;&#x673a;&#x53f7;&#x20;&#x2f;&#x20;&#x6635;&#x79f0;"></div><div id="usersTable"></div></section><section class="panel hidden" data-panel="feedback"><div class="head"><b>&#x53cd;&#x9988;&#x4fe1;&#x606f;</b></div><div id="feedbackTable"></div></section><section class="panel hidden" data-panel="redeem"><div class="head"><b>&#x751f;&#x6210;&#x4f1a;&#x5458;&#x7801;</b></div><div class="body"><div class="grid"><input id="redeemCountInput" type="number" min="1" max="100" value="5"><input id="redeemDays" type="number" min="0" value="1"><select id="redeemPlan"><option value="mc_share_day">&#x5206;&#x4eab;&#x89e3;&#x9501;&#x20;&#x4d;&#x43;&#x20;&#x31;&#x20;&#x5929;</option><option value="mc_paid_day">&#x4d;&#x43;&#x20;&#x65e5;&#x5361;&#x20;&#x39;&#x2e;&#x39;</option><option value="mc_paid_month">&#x4d;&#x43;&#x20;&#x6708;&#x5361;&#x20;&#x31;&#x39;&#x2e;&#x39;</option><option value="mc_paid_lifetime">&#x4d;&#x43;&#x20;&#x6c38;&#x4e45;&#x20;&#x39;&#x39;</option><option value="voice_credits_50">&#x41;&#x49;&#x20;&#x64ad;&#x62a5;&#x5305;&#x20;&#x35;&#x30;&#x20;&#x6b21;</option><option value="voice_credits_150">&#x41;&#x49;&#x20;&#x64ad;&#x62a5;&#x5305;&#x20;&#x31;&#x35;&#x30;&#x20;&#x6b21;</option><option value="voice_credits_400">&#x41;&#x49;&#x20;&#x64ad;&#x62a5;&#x5305;&#x20;&#x34;&#x30;&#x30;&#x20;&#x6b21;</option></select></div><div class="row" style="margin-top:12px"><button class="btn primary" id="createRedeem">&#x751f;&#x6210;&#x4f1a;&#x5458;&#x7801;</button><button class="btn" id="copyRedeem">&#x590d;&#x5236;&#x7ed3;&#x679c;</button></div><div class="result" id="redeemResult"></div></div></section><section class="panel hidden" data-panel="audio"><div class="head"><b>MC &#x97f3;&#x4e50;&#x5e93;</b><div class="row"><button class="btn" id="initAudio">&#x521d;&#x59cb;&#x5316;&#x9ed8;&#x8ba4;&#x97f3;&#x4e50;</button><button class="btn" id="refreshAudio">&#x5237;&#x65b0;&#x5217;&#x8868;</button></div></div><div class="body"><div class="grid"><select id="audioChannel"><option value="two">2&#x5206;&#x97f3;&#x6548;</option><option value="three">3&#x5206;&#x97f3;&#x6548;</option><option value="rest">&#x4f11;&#x606f;&#x97f3;&#x4e50;</option><option value="defense">&#x9632;&#x5b88;&#x97f3;&#x4e50;</option><option value="attack">&#x8fdb;&#x653b;&#x97f3;&#x4e50;</option><option value="buzzer">&#x8702;&#x9e23;&#x5668;</option><option value="start">&#x6bd4;&#x8d5b;&#x5f00;&#x59cb;&#x97f3;&#x6548;</option><option value="voice">&#x64ad;&#x62a5;&#x97f3;&#x8272;&#x5e93;</option><option value="cheer">&#x6b22;&#x547c;&#x58f0;</option><option value="applause">&#x638c;&#x58f0;</option><option value="miss">&#x6295;&#x7bee;&#x672a;&#x8fdb;</option><option value="ambience">&#x6c1b;&#x56f4;&#x97f3;&#x6548;</option></select><input id="audioName" placeholder="&#x97f3;&#x6548;&#x540d;&#x79f0;&#xff0c;&#x4f8b;&#x5982;&#xff1a;&#x6b22;&#x547c;&#x58f0;"><input id="audioFileID" placeholder="cloud://.../mc-mp3/..."></div><div class="row" style="margin-top:12px"><button class="btn green" id="saveAudio">&#x4fdd;&#x5b58;&#x5230;&#x97f3;&#x4e50;&#x5e93;</button></div><div class="result" id="audioResult"></div><div id="audioList"></div></div></section></main></div><script>const state={users:[],feedback:[],orders:[],entitlements:[],redeemCodes:[],matchResults:[],audioItems:[],stats:{},userKeyword:''};const channelLabels={two:'2\u5206\u97f3\u6548',three:'3\u5206\u97f3\u6548',rest:'\u4f11\u606f\u97f3\u4e50',defense:'\u9632\u5b88\u97f3\u4e50',attack:'\u8fdb\u653b\u97f3\u4e50',buzzer:'\u8702\u9e23\u5668',start:'\u6bd4\u8d5b\u5f00\u59cb\u97f3\u6548',voice:'\u64ad\u62a5\u97f3\u8272\u5e93',cheer:'\u6b22\u547c\u58f0',applause:'\u638c\u58f0',miss:'\u6295\u7bee\u672a\u8fdb',ambience:'\u6c1b\u56f4\u97f3\u6548'};const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));const auth=u=>u.openid||u.wxOpenId||u.userId||'';const phone=u=>u.phoneNumber||u.phone||'';const save=()=>{localStorage.setItem('sx_admin_gateway',$('gatewayBase').value.trim());localStorage.setItem('sx_admin_token',$('adminToken').value.trim())};const api=n=>{const b=$('gatewayBase').value.trim().replace(/\/$/,'');if(!b)throw Error('\u8bf7\u5148\u586b\u5199\u4e91\u51fd\u6570 HTTP \u7f51\u5173\u57df\u540d');return b+'/'+n};async function post(n,p={}){save();const r=await fetch(api(n),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...p,adminToken:$('adminToken').value.trim()})});return r.json()}function tag(s,k=''){return '<span class="tag '+k+'">'+esc(s)+'</span>'}function stats(){$('userCount').textContent=state.users.length||state.stats.users||0;$('feedbackCount').textContent=state.feedback.length||state.stats.feedback||0;$('orderCount').textContent=state.orders.length||state.stats.orders||0;$('entitlementCount').textContent=state.entitlements.length||state.stats.entitlements||0;$('redeemCount').textContent=state.redeemCodes.length||state.stats.redeemCodes||0;$('matchCount').textContent=state.matchResults.length||state.stats.matchResults||0}function member(u){if(u.membershipStatus!=='active')return tag('\u672a\u5f00\u901a','gray');return tag(u.membershipType==='paid'?'\u4ed8\u8d39\u4f1a\u5458':'\u514d\u8d39\u4f1a\u5458',u.membershipType==='paid'?'ok':'')}function users(){const kw=state.userKeyword.trim().toLowerCase();const list=state.users.filter(u=>[u.nickName,auth(u),phone(u)].join(' ').toLowerCase().includes(kw));$('usersTable').innerHTML=list.length?'<table><thead><tr><th>\u6635\u79f0</th><th>OpenID</th><th>\u624b\u673a\u53f7</th><th>\u4f1a\u5458\u72b6\u6001</th><th>\u6d3b\u8dc3\u6570\u636e</th><th>\u64cd\u4f5c</th></tr></thead><tbody>'+list.map(u=>'<tr><td><b>'+esc(u.nickName||'\u5fae\u4fe1\u7528\u6237')+'</b></td><td class="mono">'+esc(auth(u)||'-')+'</td><td>'+esc(phone(u)||'-')+'</td><td>'+member(u)+'<div class="muted">'+esc(u.membershipProductName||'')+'</div><div class="muted">'+(u.membershipDaysLeft===9999?'\u6c38\u4e45':esc((u.membershipDaysLeft||0)+' \u5929'))+'</div></td><td>\u4f7f\u7528 '+esc(u.activeDays||0)+' \u5929<br>\u6700\u8fd1\u6d3b\u8dc3\uff1a'+esc(u.lastActivityAt||'-')+'<br>\u8d5b\u679c\u6570\uff1a'+esc(u.matchCount||0)+'</td><td><div class="row"><button class="btn mini danger" data-action="revoke" data-openid="'+esc(auth(u))+'">\u64a4\u9500</button><button class="btn mini" data-action="extend" data-openid="'+esc(auth(u))+'">\u5ef6\u957f</button><button class="btn mini" data-action="set" data-openid="'+esc(auth(u))+'">\u8bbe\u7f6e\u5929\u6570</button><button class="btn mini" data-action="lifetime" data-openid="'+esc(auth(u))+'">\u8bbe\u4e3a\u6c38\u4e45</button></div></td></tr>').join('')+'</tbody></table>':'<div class="body muted">\u6682\u65e0\u7528\u6237</div>'}function feedback(id='feedbackTable',limit){let list=state.feedback;if(limit)list=list.slice(0,limit);$(id).innerHTML=list.length?'<table><thead><tr><th>\u7c7b\u578b</th><th>\u5185\u5bb9</th><th>\u7528\u6237</th><th>\u8054\u7cfb\u65b9\u5f0f</th><th>\u65f6\u95f4</th></tr></thead><tbody>'+list.map(i=>'<tr><td>'+tag(i.type||'\u672a\u5206\u7c7b')+'</td><td>'+esc(i.content||'')+'</td><td>'+esc(i.user?.nickName||i.nickName||'\u672a\u77e5\u7528\u6237')+'<div class="mono muted">'+esc(auth(i.user||i)||'-')+'</div></td><td>'+esc(i.contact||'-')+'</td><td>'+esc(i.createdAt||'-')+'</td></tr>').join('')+'</tbody></table>':'<div class="body muted">\u6682\u65e0\u53cd\u9988</div>'}function audio(items=state.audioItems){state.audioItems=Array.isArray(items)?items:[];$('audioList').innerHTML=state.audioItems.length?state.audioItems.map(i=>'<div class="audio"><span>'+tag(channelLabels[i.channel]||i.channel||'-')+'</span><b>'+esc(i.name||'\u97f3\u6548')+'</b><span class="mono muted">'+esc(i.fileID||i.fileId||'-')+'</span></div>').join(''):'<div class="body muted">\u6682\u65e0\u97f3\u4e50</div>'}function setData(d){state.users=Array.isArray(d.users)?d.users:[];state.feedback=Array.isArray(d.feedback)?d.feedback:[];state.orders=Array.isArray(d.orders)?d.orders:[];state.entitlements=Array.isArray(d.entitlements)?d.entitlements:[];state.redeemCodes=Array.isArray(d.redeemCodes)?d.redeemCodes:[];state.matchResults=Array.isArray(d.matchResults)?d.matchResults:[];state.audioItems=Array.isArray(d.audioItems)?d.audioItems:state.audioItems;state.stats=d.stats||{};stats();users();feedback();feedback('overviewContent',5);audio()}async function updateMember(openid,action){if(!openid)return alert('\u7f3a\u5c11 openid');let days=1;if(action==='extend'||action==='set'){const v=prompt('\u8bf7\u8f93\u5165\u4f1a\u5458\u5929\u6570','1');if(v===null)return;days=Number(v||1)}if(action==='revoke'&&!confirm('\u786e\u5b9a\u64a4\u9500\u8be5\u7528\u6237\u6240\u6709\u751f\u6548\u4f1a\u5458\u6743\u76ca\u5417\uff1f'))return;const r=await post('sxAdminUpdateEntitlement',{openid,action,days});alert(r.ok?'\u64cd\u4f5c\u6210\u529f':'\u64cd\u4f5c\u5931\u8d25\uff1a'+(r.message||''));$('loadCloud').click()}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(i=>i.classList.remove('active'));b.classList.add('active');document.querySelectorAll('[data-panel]').forEach(p=>p.classList.toggle('hidden',p.dataset.panel!==b.dataset.tab))});$('gatewayBase').value=localStorage.getItem('sx_admin_gateway')||'';$('adminToken').value=localStorage.getItem('sx_admin_token')||'';$('gatewayBase').onchange=save;$('adminToken').onchange=save;$('userSearch').oninput=e=>{state.userKeyword=e.target.value;users()};$('loadCloud').onclick=async()=>{try{setData(await post('sxAdminDashboard'))}catch(e){alert(e.message)}};$('loadSample').onclick=async()=>setData(await(await fetch('./sample-data.json')).json());$('usersTable').onclick=e=>{const b=e.target.closest('button[data-action]');if(b)updateMember(b.dataset.openid,b.dataset.action)};$('createRedeem').onclick=async()=>{try{const r=await post('sxCreateRedeemCode',{count:Number($('redeemCountInput').value||1),durationDays:Number($('redeemDays').value||1),plan:$('redeemPlan').value});$('redeemResult').textContent=r.ok?r.codes.map(i=>i.code).join('\n'):JSON.stringify(r,null,2)}catch(e){$('redeemResult').textContent=e.message}};$('copyRedeem').onclick=()=>navigator.clipboard.writeText($('redeemResult').textContent||'');$('saveAudio').onclick=async()=>{try{const r=await post('sxSaveAudioLibrary',{channel:$('audioChannel').value,name:$('audioName').value,fileID:$('audioFileID').value});$('audioResult').textContent=JSON.stringify(r,null,2);$('refreshAudio').click()}catch(e){$('audioResult').textContent=e.message}};$('initAudio').onclick=async()=>{try{const r=await post('sxSaveAudioLibrary',{preset:'sxf_default'});$('audioResult').textContent=JSON.stringify(r,null,2);$('refreshAudio').click()}catch(e){$('audioResult').textContent=e.message}};$('refreshAudio').onclick=async()=>{try{const r=await post('sxGetAudioLibrary');$('audioResult').textContent=JSON.stringify(r,null,2);audio(r.items||[])}catch(e){$('audioResult').textContent=e.message}};setData({});</script></body></html>
